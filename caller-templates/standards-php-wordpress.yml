# Drop this file into a WordPress/PHP consuming repo at:
#   .github/workflows/standards.yml
#
# Pin the workflow ref to a major release tag (e.g. @v1), never @main in production.
# Three independent axes — move them independently:
#   1. Workflow ref  (@v1)           — the executable. Bugfixes bump this only.
#   2. profile_version (v1)         — the dependency/config contract. Bump to adopt new required surface.
#   3. enforcement_mode (required)  — fail-closed. advisory = warn-only (exceptions file is optional in both modes).
#
# Secrets required in the consuming repo (Settings → Secrets → Actions):
#   ANTHROPIC_API_KEY        — Anthropic API key for claude-pr-review
#   ADR_REGISTRY_READ_TOKEN  — Read-only PAT (or App token) for sparxstar-architecture-governance-registry
#   STANDARDS_READ_TOKEN     — Read-only PAT (or App token) for sparxstar-code-conformance
# Both ADR/STANDARDS tokens are optional — if absent the review still runs (those context blocks are skipped).

name: Starisian Standards

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  pnpm:
    if: ${{ hashFiles('package.json') != '' }}
    uses: Starisian-Technologies/sparxstar-code-conformance/.github/workflows/pnpm-enforcement.yml@v1
    with:
      enforcement_mode: required
    secrets: inherit

  php:
    uses: Starisian-Technologies/sparxstar-code-conformance/.github/workflows/php-enforcement.yml@v1
    with:
      repo_type: wp-plugin
      profile_version: v1
      enforcement_mode: required
      php-version: '8.3'
      phpstan-level: '5'
    secrets: inherit

  css:
    uses: Starisian-Technologies/sparxstar-code-conformance/.github/workflows/css-enforcement.yml@v1
    with:
      repo_type: wp-plugin
      profile_version: v1
      enforcement_mode: required
    secrets: inherit

  media:
    uses: Starisian-Technologies/sparxstar-code-conformance/.github/workflows/media-enforcement.yml@v1
    with:
      enforcement_mode: required
      profile_version: v1
    secrets: inherit

  review:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    uses: Starisian-Technologies/sparxstar-claude-pr-review/.github/workflows/claude-pr-review.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ADR_REGISTRY_READ_TOKEN: ${{ secrets.ADR_REGISTRY_READ_TOKEN }}
      STANDARDS_READ_TOKEN: ${{ secrets.STANDARDS_READ_TOKEN }}
